version: "2"
sql:
  - schema: 
      - "supabase/migrations/000001_init_schema.sql"
      - "internal/adapters/postgres/schema/auth.sql"
    queries: "internal/adapters/postgres/schema/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/adapters/postgres/db"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
